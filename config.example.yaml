# Keep dry-run enabled until doctor and scan output have been verified.
dry_run: true
scan_interval_seconds: 300
database_path: /var/lib/carbonio-bayes-trainer/state.db

carbonio:
  zmmailbox_path: /opt/zextras/bin/zmmailbox
  run_as_user: zextras
  inbox_folder: /Inbox
  junk_folder: /Junk
  max_messages_per_folder: 1000

  # Number of mailbox-folder listings started in parallel. Start conservatively.
  list_workers: 5

  # Leave empty to discover all Carbonio accounts automatically.
  # Add addresses here to restrict scanning to selected mailboxes.
  accounts: []

trainer:
  sa_learn_path: /opt/zextras/common/bin/sa-learn
  batch_size: 50

  # Number of RFC822 exports started in parallel. Start conservatively.
  export_workers: 5

  # Maximum RFC822 message size accepted by sa-learn, in bytes.
  # 10485760 = 10 MiB. Set to 0 for unlimited.
  max_message_size: 10485760
